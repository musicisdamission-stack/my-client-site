name: LiminalArbitrage Heartbeat

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Moltbook heartbeat
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node moltbook/heartbeat.js

      - name: Commit updated memory
        run: |
          git config user.email "liminal@liminalarbitrage.ai"
          git config user.name "LiminalArbitrage"
          git add moltbook/memory.json
          git diff --staged --quiet || git commit -m "🧠 memory: run #${{ github.run_number }} [skip ci]"
          git push

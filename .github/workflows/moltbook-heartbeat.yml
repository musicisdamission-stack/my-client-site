name: LiminalArbitrage Heartbeat

on:
  schedule:
    - cron: '0 * * * *'  # Every hour (public repo — unlimited free Actions minutes)
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so rebase always works

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Moltbook heartbeat
        env:
          MOLTBOOK_API_KEY:   ${{ secrets.MOLTBOOK_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_LIMINAL }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_LIMINAL }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVIN_LABS }}
          FAL_API_KEY:        ${{ secrets.FAL }}
          OPENAI_API_KEY:     ${{ secrets.CHAT_GPT }}
        run: node moltbook/heartbeat.js

      - name: Commit and push memory
        run: |
          git config user.email "liminal@liminalarbitrage.ai"
          git config user.name "LiminalArbitrage"
          git add moltbook/memory.json moltbook/LATEST.md moltbook/upgrades.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "🧠 memory: run #${{ github.run_number }} [skip ci]"
          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            git fetch origin main
            git rebase origin/main && git push origin main && echo "Push succeeded" && exit 0
            echo "Push rejected — retrying after rebase..."
            sleep $((attempt * 3))
          done
          echo "All push attempts failed"
          exit 1

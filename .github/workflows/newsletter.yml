name: LiminalArbitrage Newsletter

on:
  schedule:
    - cron: '0 10 * * 0'  # Every Sunday at 10am UTC
  workflow_dispatch:

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate and publish newsletter
        env:
          OPENAI_API_KEY:     ${{ secrets.CHAT_GPT }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_LIMINAL }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_LIMINAL }}
          PARAGRAPH_API_KEY:  ${{ secrets.PARAGRAPH }}
        run: node moltbook/newsletter.js

name: LiminalArbitrage Weekly Reflection

on:
  schedule:
    - cron: '0 3 * * 0'  # Sundays at 3am UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  reflect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so rebase always works

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run weekly reflection
        env:
          MOLTBOOK_API_KEY:   ${{ secrets.MOLTBOOK_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: node moltbook/reflect.js

      - name: Commit and push memory
        run: |
          git config user.email "liminal@liminalarbitrage.ai"
          git config user.name "LiminalArbitrage"
          git add moltbook/memory.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "🪞 reflect: weekly reflection [skip ci]"
          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            git fetch origin main
            git rebase origin/main && git push origin main && echo "Push succeeded" && exit 0
            echo "Push rejected — retrying after rebase..."
            sleep $((attempt * 3))
          done
          echo "All push attempts failed"
          exit 1

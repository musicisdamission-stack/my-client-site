name: Deploy LiminalArbitrage API

on:
  workflow_dispatch:  # Manual only — API is stable, deploy intentionally

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: api
        run: npm install

      - name: Deploy to Cloudflare Workers
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE }}
        run: npx wrangler deploy

      - name: Set secrets
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_LIMINAL }}
          OPENAI_API_KEY: ${{ secrets.CHAT_GPT }}
        run: |
          echo "$PERPLEXITY_API_KEY" | npx wrangler secret put PERPLEXITY_API_KEY
          echo "$OPENAI_API_KEY"     | npx wrangler secret put OPENAI_API_KEY
